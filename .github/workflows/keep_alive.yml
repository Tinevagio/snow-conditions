name: Keep Render Alive

on:
  schedule:
    - cron: '*/10 * * * *'  # toutes les 10 minutes
  workflow_dispatch:         # déclenchement manuel possible

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping snow-conditions API
        run: |
          echo "Ping $(date)"
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://snow-conditions.onrender.com/health)
          echo "Status: $STATUS"
          if [ "$STATUS" != "200" ]; then
            echo "⚠️ API non disponible (status $STATUS)"
          else
            echo "✅ API disponible"
          fi
